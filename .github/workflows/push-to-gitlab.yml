name: Force push branch to GitLab

on:
  push:
    branches:
      - "**"

concurrency:
  group: gitlab-mirror-${{ github.ref }}
  cancel-in-progress: true

jobs:
  push-branch:
    if: github.repository == 'freeplane/freeplane'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Force push current branch to GitLab
        env:
          GITLAB_REPO_URL: ${{ secrets.GITLAB_REPO_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

          AUTH_URL=$(echo "$GITLAB_REPO_URL" | sed "s#https://#https://oauth2:${GITLAB_TOKEN}@#")
          git remote add gitlab "$AUTH_URL"

          git push gitlab HEAD:refs/heads/${BRANCH} --force
